<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>Menu Content</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    This is the menu content.
  </ion-content>
</ion-menu>


<!-- CONTENIDO PRINCIPAL -->
<div class="ion-page" id="main-content">

  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>Meritly</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>

    <ion-item>
      <ion-input label="Puntos:"></ion-input>
      <ion-img src="assets/profile-2398782_640.webp" style="width:50px; height:50px;"></ion-img>
    </ion-item>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Selecciona una fecha</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-datetime
          presentation="date"
          locale="es-MX"
          (ionChange)="onDateChange($event)">
        </ion-datetime>
        @if (selectedDate) {
          <p>Fecha elegida: {{ selectedDate }}</p>
        }

        

      </ion-card-content>
    </ion-card>

  </ion-content>

</div>
