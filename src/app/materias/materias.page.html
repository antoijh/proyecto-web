<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Materias</ion-title>
  </ion-toolbar>
</ion-header>


<ion-menu contentId="main-content">

  <ion-header>
    <ion-toolbar>
      <ion-title>Menú</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">


    <ion-item lines="none">
      <ion-avatar slot="start">
        <img [src]="avatar">
      </ion-avatar>

      <ion-label>
        <h2>{{ nombre }}</h2>
        <p>Puntos: 120</p>
      </ion-label>
    </ion-item>

    
    <ion-list>

      <ion-item routerLink="/home">
        <ion-label>Inicio</ion-label>
      </ion-item>

      <ion-item routerLink="/materias">
        <ion-label>Materias</ion-label>
      </ion-item>

      <ion-item routerLink="/actividades">
        <ion-label>Actividades</ion-label>
      </ion-item>

    </ion-list>

    <ion-list>
      <ion-item routerLink="/configuracion">
        <ion-label>Configuración</ion-label>
      </ion-item>
    </ion-list>

    <ion-button expand="block" routerLink="/login">
      Cerrar sesión
    </ion-button>

  </ion-content>

</ion-menu>



<ion-content id="main-content" [fullscreen]="true">

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Materias</ion-title>
    </ion-toolbar>
  </ion-header>

</ion-content>
